<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <meta name="description" content="Offline Kanban Board" />
  <style>
    /* ─── Reset & Tokens ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --radius: 8px;
      --radius-lg: 12px;
      --transition: .18s ease;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    [data-theme="light"] {
      --bg:          #f0f2f5;
      --surface:     #ffffff;
      --surface2:    #f7f8fa;
      --border:      #e2e5ea;
      --text:        #1a1d23;
      --text-muted:  #6b7280;
      --accent:      #3b82f6;
      --accent-h:    #2563eb;
      --danger:      #ef4444;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:   0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
      --shadow-lg:   0 20px 40px rgba(0,0,0,.15);
      --col-bg:      #e8eaee;
    }

    [data-theme="dark"] {
      --bg:          #0f1117;
      --surface:     #1c1f26;
      --surface2:    #252830;
      --border:      #2e3340;
      --text:        #e8eaf0;
      --text-muted:  #8b92a5;
      --accent:      #60a5fa;
      --accent-h:    #93c5fd;
      --danger:      #f87171;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.3);
      --shadow-md:   0 4px 12px rgba(0,0,0,.4);
      --shadow-lg:   0 20px 40px rgba(0,0,0,.6);
      --col-bg:      #1c1f26;
    }

    /* ─── Base ────────────────────────────────────────── */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }

    button {
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      padding: .4rem .8rem;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }
    button:hover { background: var(--surface2); box-shadow: var(--shadow-sm); }
    button:active { transform: scale(.97); }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    button.primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
    button.danger  {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    button.icon-btn {
      padding: .3rem;
      border: none;
      background: transparent;
      box-shadow: none;
      color: var(--text-muted);
      border-radius: 6px;
    }
    button.icon-btn:hover { background: var(--border); color: var(--text); box-shadow: none; }

    input, textarea {
      font-family: var(--font);
      font-size: 13px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .45rem .65rem;
      width: 100%;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      resize: vertical;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    /* ─── Header ──────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .65rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -.3px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .logo svg { flex-shrink: 0; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-left: auto;
    }

    /* ─── Board ───────────────────────────────────────── */
    #board {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #board::-webkit-scrollbar { height: 8px; }
    #board::-webkit-scrollbar-track { background: transparent; }
    #board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Column ──────────────────────────────────────── */
    .column {
      background: var(--col-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 268px;
      min-width: 268px;
      display: flex;
      flex-direction: column;
      max-height: calc(100dvh - 110px);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition);
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .7rem .75rem .6rem;
      border-bottom: 1px solid var(--border);
    }

    .column-title {
      flex: 1;
      font-weight: 600;
      font-size: 13px;
      outline: none;
      border-radius: 5px;
      padding: .2rem .4rem;
      border: 1px solid transparent;
      transition: border-color var(--transition), background var(--transition);
      word-break: break-word;
      background: transparent;
      color: var(--text);
      cursor: default;
    }
    .column-title:focus {
      border-color: var(--accent);
      background: var(--surface);
      cursor: text;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .col-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--border);
      border-radius: 20px;
      padding: .1rem .5rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    /* ─── Cards Container ────────────────────────────── */
    .cards {
      flex: 1;
      overflow-y: auto;
      padding: .6rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .cards::-webkit-scrollbar { width: 5px; }
    .cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── Card ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .65rem .7rem;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), transform var(--transition);
      word-break: break-word;
      position: relative;
      border-left-width: 4px;
      user-select: none;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .card.dragging { opacity: .45; box-shadow: none; transform: rotate(1.5deg); }

    .card-title {
      font-weight: 500;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: .4rem;
      margin-top: .45rem;
      flex-wrap: wrap;
    }

    .card-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .card-desc-hint {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: .2rem;
    }

    /* ─── Drag placeholder ───────────────────────────── */
    .drop-placeholder {
      border: 2px dashed var(--accent);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      min-height: 52px;
      flex-shrink: 0;
      pointer-events: none;
      transition: min-height .1s;
    }

    /* ─── Add card button ────────────────────────────── */
    .add-card-btn {
      margin: 0 .6rem .6rem;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      justify-content: center;
      font-size: 12px;
      padding: .45rem;
      transition: all var(--transition);
    }
    .add-card-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, transparent);
      box-shadow: none;
    }

    /* ─── Add Column Button ──────────────────────────── */
    #add-column-btn {
      min-width: 230px;
      width: 230px;
      height: 52px;
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      border: 2px dashed color-mix(in srgb, var(--accent) 40%, transparent);
      color: var(--accent);
      border-radius: var(--radius-lg);
      font-size: 13px;
      font-weight: 500;
      align-self: flex-start;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    #add-column-btn:hover {
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      border-color: var(--accent);
      box-shadow: none;
    }

    /* ─── Modal ───────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 480px;
      max-width: calc(100vw - 2rem);
      max-height: calc(100dvh - 4rem);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      transform: translateY(12px) scale(.97);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
      overflow: hidden;
    }
    .modal-backdrop.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: 1rem 1.1rem .85rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-header h2 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .modal-body {
      padding: 1rem 1.1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: .85rem;
    }

    .form-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: .35rem;
    }

    /* Rich text toolbar */
    .rt-toolbar {
      display: flex;
      gap: .3rem;
      padding: .4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      flex-wrap: wrap;
    }
    .rt-toolbar button {
      padding: .3rem .5rem;
      font-size: 12px;
      border-radius: 5px;
      min-width: 28px;
      justify-content: center;
    }

    .rt-editor {
      min-height: 110px;
      max-height: 220px;
      overflow-y: auto;
      padding: .6rem .65rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      outline: none;
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .rt-editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }
    .rt-editor ul, .rt-editor ol { padding-left: 1.4rem; }

    /* Color picker */
    .color-swatches {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--text); transform: scale(1.12); }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .75rem 1.1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: .5rem;
    }

    .card-created {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ─── Save indicator ─────────────────────────────── */
    #save-toast {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem .9rem;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: .4rem;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 200;
    }
    #save-toast.visible { opacity: 1; transform: translateY(0); }

    /* ─── Empty state ────────────────────────────────── */
    .col-empty {
      text-align: center;
      padding: 1.5rem .5rem;
      color: var(--text-muted);
      font-size: 12px;
    }
    .col-empty svg { display: block; margin: 0 auto .5rem; opacity: .35; }

    /* ─── Scrollbar general ──────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ───── Header ───── -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
      <rect x="1" y="1" width="8" height="12" rx="2.5" fill="var(--accent)" opacity=".9"/>
      <rect x="13" y="1" width="8" height="8" rx="2.5" fill="var(--accent)" opacity=".55"/>
      <rect x="13" y="13" width="8" height="8" rx="2.5" fill="var(--accent)" opacity=".75"/>
    </svg>
    Kanban
  </div>

  <div class="header-actions">
    <button id="add-col-header-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Колонка
    </button>
    <button id="export-btn" title="Экспорт JSON">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M2 10v2h10v-2M7 1v8M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Экспорт
    </button>
    <button id="import-btn" title="Импорт JSON">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M2 10v2h10v-2M7 9V1M4 4l3-3 3 3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Импорт
    </button>
    <button id="theme-btn" title="Переключить тему">
      <svg id="theme-icon" width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
        <circle cx="7.5" cy="7.5" r="3" fill="currentColor"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3.1 3.1l1.1 1.1M10.8 10.8l1.1 1.1M10.8 3.1l-1.1 1.1M3.1 10.8l1.1 1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
    <input type="file" id="file-input" accept="application/json" hidden>
  </div>
</header>

<!-- ───── Board ───── -->
<main id="board" role="main" aria-label="Kanban board"></main>

<!-- ───── Card Modal ───── -->
<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal" id="modal">
    <div class="modal-header">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="13" height="13" rx="3" stroke="var(--accent)" stroke-width="1.5"/>
        <path d="M4 5h7M4 7.5h7M4 10h4" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <h2 id="modal-title">Карточка</h2>
      <button class="icon-btn" id="modal-close" aria-label="Закрыть">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <!-- Title -->
      <div class="form-field">
        <label for="card-title-input">Заголовок</label>
        <input id="card-title-input" type="text" placeholder="Название карточки…" maxlength="120" />
      </div>

      <!-- Description -->
      <div class="form-field">
        <label>Описание</label>
        <div class="rt-toolbar" id="rt-toolbar">
          <button data-cmd="bold" title="Жирный (Ctrl+B)"><b>B</b></button>
          <button data-cmd="italic" title="Курсив (Ctrl+I)"><i>I</i></button>
          <button data-cmd="underline" title="Подчёркнутый"><u>U</u></button>
          <button data-cmd="strikeThrough" title="Зачёркнутый"><s>S</s></button>
          <button data-cmd="insertUnorderedList" title="Список">
            <svg width="13" height="11" viewBox="0 0 13 11" fill="none"><circle cx="1.5" cy="1.5" r="1.5" fill="currentColor"/><path d="M5 1.5h8M5 5.5h8M5 9.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="1.5" cy="5.5" r="1.5" fill="currentColor"/><circle cx="1.5" cy="9.5" r="1.5" fill="currentColor"/></svg>
          </button>
          <button data-cmd="insertOrderedList" title="Нумерованный список">1.</button>
          <button data-cmd="removeFormat" title="Очистить форматирование">✕</button>
        </div>
        <div
          class="rt-editor"
          id="card-desc-editor"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          aria-label="Описание карточки"
        ></div>
      </div>

      <!-- Color -->
      <div class="form-field">
        <label>Цвет метки</label>
        <div class="color-swatches" id="color-swatches"></div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="danger" id="modal-delete">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
          <path d="M1 3h11M5 3V1.5h3V3M2.5 3l.7 8h7l.7-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Удалить
      </button>
      <span class="card-created" id="card-created-date"></span>
      <button class="primary" id="modal-save">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
          <path d="M2 7l3.5 3.5L11 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Сохранить
      </button>
    </div>
  </div>
</div>

<!-- ───── Save toast ───── -->
<div id="save-toast" role="status" aria-live="polite">
  <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
    <path d="M2 7l3.5 3.5L11 3" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Сохранено
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   KANBAN APP
═══════════════════════════════════════════════════════ */
const KanbanApp = (() => {

  // ── Config ─────────────────────────────────────────
  const STORAGE_KEY = 'kanban_v2';
  const COLORS = [
    { hex: '#94a3b8', label: 'Серый' },
    { hex: '#f9a8d4', label: 'Розовый' },
    { hex: '#fcd34d', label: 'Жёлтый' },
    { hex: '#86efac', label: 'Зелёный' },
    { hex: '#93c5fd', label: 'Синий' },
    { hex: '#c4b5fd', label: 'Фиолетовый' },
    { hex: '#fdba74', label: 'Оранжевый' },
  ];

  // ── State ───────────────────────────────────────────
  let data      = { columns: [] };
  let editCard  = null;  // { cardId, colId }
  let dragState = null;  // { cardId, colId, el }

  // ── Storage ─────────────────────────────────────────
  const storage = (() => {
    let _available = null;
    function available() {
      if (_available !== null) return _available;
      try { localStorage.setItem('__test', '1'); localStorage.removeItem('__test'); _available = true; }
      catch { _available = false; }
      return _available;
    }
    function load() {
      if (!available()) return null;
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
    }
    function save(d) {
      if (!available()) return;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
    }
    return { available, load, save };
  })();

  // ── ID ──────────────────────────────────────────────
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // ── Persist ─────────────────────────────────────────
  let _toastTimer = null;
  function persist() {
    storage.save(data);
    const t = document.getElementById('save-toast');
    t.classList.add('visible');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('visible'), 1800);
  }

  // ── Data helpers ────────────────────────────────────
  function findColumn(colId)       { return data.columns.find(c => c.id === colId); }
  function findCard(colId, cardId) { return findColumn(colId)?.cards.find(c => c.id === cardId); }

  function findCardGlobal(cardId) {
    for (const col of data.columns) {
      const card = col.cards.find(c => c.id === cardId);
      if (card) return { card, col };
    }
    return null;
  }

  // ── Default data ─────────────────────────────────────
  function defaultData() {
    const cols = ['Бэклог', 'В работе', 'Готово'];
    return {
      columns: cols.map(title => ({
        id: uid(), title, cards: []
      }))
    };
  }

  // ══════════════════════════════════════════════════════
  //   RENDER
  // ══════════════════════════════════════════════════════
  const board = document.getElementById('board');

  function render() {
    board.innerHTML = '';
    data.columns.forEach(col => board.appendChild(buildColumnEl(col)));
    // Add column button at end
    const addBtn = document.createElement('button');
    addBtn.id = 'add-column-btn';
    addBtn.setAttribute('aria-label', 'Добавить колонку');
    addBtn.innerHTML = svgPlus() + ' Добавить колонку';
    addBtn.addEventListener('click', addColumn);
    board.appendChild(addBtn);
  }

  function buildColumnEl(col) {
    const el = document.createElement('section');
    el.className = 'column';
    el.dataset.colId = col.id;
    el.setAttribute('aria-label', col.title);

    // Header
    const header = document.createElement('div');
    header.className = 'column-header';

    const titleEl = document.createElement('div');
    titleEl.className = 'column-title';
    titleEl.contentEditable = 'true';
    titleEl.spellcheck = false;
    titleEl.setAttribute('role', 'textbox');
    titleEl.setAttribute('aria-label', 'Название колонки');
    titleEl.textContent = col.title;

    titleEl.addEventListener('blur', () => {
      const val = titleEl.textContent.trim();
      if (!val) { titleEl.textContent = col.title; return; }
      col.title = val;
      persist();
    });
    titleEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
    });

    const countBadge = document.createElement('span');
    countBadge.className = 'col-count';
    countBadge.textContent = col.cards.length;

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn';
    delBtn.title = 'Удалить колонку';
    delBtn.setAttribute('aria-label', 'Удалить колонку ' + col.title);
    delBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;
    delBtn.addEventListener('click', () => deleteColumn(col.id));

    header.append(titleEl, countBadge, delBtn);

    // Cards container
    const cardsEl = document.createElement('div');
    cardsEl.className = 'cards';
    cardsEl.dataset.colId = col.id;

    if (col.cards.length === 0) {
      cardsEl.innerHTML = `
        <div class="col-empty">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="24" height="24" rx="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M9 14h10M14 9v10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Нет карточек
        </div>`;
    } else {
      col.cards.forEach(card => cardsEl.appendChild(buildCardEl(card)));
    }

    // Drop zone events
    cardsEl.addEventListener('dragover', onDragOver);
    cardsEl.addEventListener('dragleave', onDragLeave);
    cardsEl.addEventListener('drop', e => onDrop(e, col.id));

    // Add card button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-card-btn';
    addBtn.dataset.action = 'add-card';
    addBtn.dataset.colId = col.id;
    addBtn.innerHTML = svgPlus(12) + ' Добавить карточку';

    el.append(header, cardsEl, addBtn);
    return el;
  }

  function buildCardEl(card) {
    const el = document.createElement('article');
    el.className = 'card';
    el.draggable = true;
    el.dataset.cardId = card.id;
    el.setAttribute('tabindex', '0');
    el.setAttribute('role', 'button');
    el.setAttribute('aria-label', card.title);
    el.style.borderLeftColor = card.color || COLORS[0].hex;

    const hasDesc = card.desc && card.desc.replace(/<[^>]*>/g, '').trim().length > 0;

    el.innerHTML = `
      <div class="card-title">${escHtml(card.title)}</div>
      <div class="card-meta">
        <span class="card-date">${fmtDate(card.created)}</span>
        ${hasDesc ? `<span class="card-desc-hint">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 2h9M1 5h9M1 8h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Есть описание
        </span>` : ''}
      </div>`;

    // Drag events
    el.addEventListener('dragstart', e => onDragStart(e, card));
    el.addEventListener('dragend',   onDragEnd);

    // Open modal
    el.addEventListener('click', () => openModal(card));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(card); } });

    return el;
  }

  // ── SVG helpers ──────────────────────────────────────
  function svgPlus(size = 14) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
  }

  // ── Utilities ────────────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'short', year:'numeric' });
  }

  // ══════════════════════════════════════════════════════
  //   DRAG & DROP
  // ══════════════════════════════════════════════════════
  let placeholder = null;

  function getPlaceholder() {
    if (!placeholder) {
      placeholder = document.createElement('div');
      placeholder.className = 'drop-placeholder';
    }
    return placeholder;
  }

  function onDragStart(e, card) {
    const found = findCardGlobal(card.id);
    if (!found) return;
    dragState = { cardId: card.id, colId: found.col.id, el: e.currentTarget };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.id);
    setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
  }

  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    getPlaceholder().remove();
    dragState = null;
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const cardsEl = e.currentTarget;
    const ph = getPlaceholder();

    const afterEl = getDragAfterElement(cardsEl, e.clientY);
    if (afterEl) {
      cardsEl.insertBefore(ph, afterEl);
    } else {
      cardsEl.appendChild(ph);
    }
  }

  function onDragLeave(e) {
    // Only remove placeholder if we're leaving the cards container entirely
    const rel = e.relatedTarget;
    if (!e.currentTarget.contains(rel)) {
      getPlaceholder().remove();
    }
  }

  function onDrop(e, targetColId) {
    e.preventDefault();
    const ph = getPlaceholder();

    if (!dragState) { ph.remove(); return; }

    const { cardId, colId: srcColId } = dragState;
    const srcCol  = findColumn(srcColId);
    const tgtCol  = findColumn(targetColId);
    if (!srcCol || !tgtCol) { ph.remove(); return; }

    const cardIdx = srcCol.cards.findIndex(c => c.id === cardId);
    if (cardIdx === -1) { ph.remove(); return; }

    const [card] = srcCol.cards.splice(cardIdx, 1);

    // Determine insertion index from placeholder position
    const cardsEl = e.currentTarget;
    const siblings = [...cardsEl.querySelectorAll('.card')];
    const phIdx    = [...cardsEl.children].indexOf(ph);
    // Count how many .card elements appear before the placeholder
    let insertAt = 0;
    let seen = 0;
    for (const child of cardsEl.children) {
      if (child === ph) break;
      if (child.classList.contains('card')) seen++;
    }
    insertAt = seen;

    tgtCol.cards.splice(insertAt, 0, card);
    ph.remove();
    persist();
    render();
  }

  function getDragAfterElement(container, y) {
    const draggables = [...container.querySelectorAll('.card:not(.dragging)')];
    return draggables.find(el => {
      const { top, height } = el.getBoundingClientRect();
      return y < top + height / 2;
    }) ?? null;
  }

  // ══════════════════════════════════════════════════════
  //   COLUMN ACTIONS
  // ══════════════════════════════════════════════════════
  function addColumn() {
    data.columns.push({ id: uid(), title: 'Новая колонка', cards: [] });
    persist();
    render();
    // Focus new column title
    const cols = board.querySelectorAll('.column-title');
    const last = cols[cols.length - 1];
    if (last) {
      last.focus();
      const range = document.createRange();
      range.selectNodeContents(last);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }

  function deleteColumn(colId) {
    const col = findColumn(colId);
    if (!col) return;
    if (!confirm(`Удалить колонку «${col.title}» и все ${col.cards.length} карточек?`)) return;
    data.columns = data.columns.filter(c => c.id !== colId);
    persist();
    render();
  }

  // ══════════════════════════════════════════════════════
  //   CARD ACTIONS
  // ══════════════════════════════════════════════════════
  function addCard(colId) {
    const col = findColumn(colId);
    if (!col) return;
    const card = {
      id:      uid(),
      title:   'Новая карточка',
      desc:    '',
      color:   COLORS[0].hex,
      created: Date.now()
    };
    col.cards.push(card);
    persist();
    render();
    openModal(card);
  }

  // ══════════════════════════════════════════════════════
  //   MODAL
  // ══════════════════════════════════════════════════════
  const backdrop    = document.getElementById('modal-backdrop');
  const titleInput  = document.getElementById('card-title-input');
  const descEditor  = document.getElementById('card-desc-editor');
  const colorPicker = document.getElementById('color-swatches');
  const createdEl   = document.getElementById('card-created-date');

  // Build color swatches once
  COLORS.forEach(({ hex, label }) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = hex;
    sw.dataset.color = hex;
    sw.title = label;
    sw.setAttribute('role', 'radio');
    sw.setAttribute('aria-label', label);
    sw.setAttribute('tabindex', '0');
    colorPicker.appendChild(sw);
  });

  function setActiveSwatch(hex) {
    colorPicker.querySelectorAll('.color-swatch').forEach(s => {
      s.classList.toggle('selected', s.dataset.color === hex);
      s.setAttribute('aria-checked', s.dataset.color === hex);
    });
  }

  function openModal(card) {
    const found = findCardGlobal(card.id);
    if (!found) return;
    editCard = { cardId: card.id, colId: found.col.id };

    titleInput.value        = card.title;
    descEditor.innerHTML    = card.desc || '';
    createdEl.textContent   = card.created ? 'Создано: ' + fmtDate(card.created) : '';
    setActiveSwatch(card.color || COLORS[0].hex);

    backdrop.classList.add('open');
    titleInput.focus();
    titleInput.select();
  }

  function closeModal() {
    backdrop.classList.remove('open');
    editCard = null;
  }

  function saveModal() {
    if (!editCard) return;
    const { cardId, colId } = editCard;
    const card = findCard(colId, cardId);
    if (!card) return;

    card.title = titleInput.value.trim() || 'Без названия';
    card.desc  = descEditor.innerHTML;
    const sel  = colorPicker.querySelector('.color-swatch.selected');
    if (sel) card.color = sel.dataset.color;

    persist();
    render();
    closeModal();
  }

  function deleteModalCard() {
    if (!editCard) return;
    const { cardId, colId } = editCard;
    const card = findCard(colId, cardId);
    if (!card) return;
    if (!confirm(`Удалить карточку «${card.title}»?`)) return;
    const col = findColumn(colId);
    col.cards = col.cards.filter(c => c.id !== cardId);
    persist();
    render();
    closeModal();
  }

  // ══════════════════════════════════════════════════════
  //   EVENT DELEGATION
  // ══════════════════════════════════════════════════════
  function setupDelegation() {
    // Board-level click delegation
    board.addEventListener('click', e => {
      const addCardBtn = e.target.closest('[data-action="add-card"]');
      if (addCardBtn) addCard(addCardBtn.dataset.colId);
    });

    // Rich text toolbar
    document.getElementById('rt-toolbar').addEventListener('click', e => {
      const btn = e.target.closest('[data-cmd]');
      if (!btn) return;
      e.preventDefault();
      document.execCommand(btn.dataset.cmd, false, null);
      descEditor.focus();
    });

    // Color swatches
    colorPicker.addEventListener('click', e => {
      const sw = e.target.closest('.color-swatch');
      if (sw) setActiveSwatch(sw.dataset.color);
    });
    colorPicker.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.target.click();
      }
    });

    // Modal buttons
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-save').addEventListener('click', saveModal);
    document.getElementById('modal-delete').addEventListener('click', deleteModalCard);

    // Backdrop click to close
    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) closeModal();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal();
      if ((e.ctrlKey || e.metaKey) && e.key === 's' && backdrop.classList.contains('open')) {
        e.preventDefault(); saveModal();
      }
    });

    // Header buttons
    document.getElementById('add-col-header-btn').addEventListener('click', addColumn);
    document.getElementById('export-btn').addEventListener('click', exportData);
    document.getElementById('import-btn').addEventListener('click', () =>
      document.getElementById('file-input').click()
    );
    document.getElementById('file-input').addEventListener('change', e => {
      importFile(e.target.files[0]);
      e.target.value = '';
    });
    document.getElementById('theme-btn').addEventListener('click', toggleTheme);
  }

  // ══════════════════════════════════════════════════════
  //   EXPORT / IMPORT
  // ══════════════════════════════════════════════════════
  function exportData() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `kanban-export-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.addEventListener('load', () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !Array.isArray(parsed.columns)) {
          throw new Error('Неверная структура файла: ожидается объект с полем "columns".');
        }
        // Validate each column and card minimally
        parsed.columns.forEach((col, ci) => {
          if (!col.id || typeof col.title !== 'string' || !Array.isArray(col.cards))
            throw new Error(`Колонка ${ci} имеет неверную структуру.`);
          col.cards.forEach((card, ki) => {
            if (!card.id || typeof card.title !== 'string')
              throw new Error(`Карточка ${ki} в колонке «${col.title}» неверна.`);
          });
        });
        data = parsed;
        persist();
        render();
      } catch (err) {
        alert('Ошибка импорта:\n' + err.message);
      }
    });
    reader.readAsText(file);
  }

  // ══════════════════════════════════════════════════════
  //   THEME
  // ══════════════════════════════════════════════════════
  function toggleTheme() {
    const html  = document.documentElement;
    const theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = theme;
    localStorage.setItem('kanban_theme', theme);
  }

  function applyStoredTheme() {
    const t = localStorage.getItem('kanban_theme');
    if (t) document.documentElement.dataset.theme = t;
  }

  // ══════════════════════════════════════════════════════
  //   SERVICE WORKER (inline Blob)
  // ══════════════════════════════════════════════════════
  function registerSW() {
    if (!('serviceWorker' in navigator)) return;

    const swCode = `
const CACHE = 'kanban-sw-v2';
const URLS   = ['/'];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(res => {
        if (!res || res.status !== 200 || res.type === 'opaque') return res;
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }).catch(() => cached);
    })
  );
});`;

    const blob = new Blob([swCode], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(() => {});
  }

  // ══════════════════════════════════════════════════════
  //   INIT
  // ══════════════════════════════════════════════════════
  function init() {
    applyStoredTheme();

    if (!storage.available()) {
      console.warn('localStorage недоступен — данные не будут сохранены.');
    }

    const stored = storage.load();
    data = (stored && Array.isArray(stored.columns)) ? stored : defaultData();

    setupDelegation();
    render();
    registerSW();
  }

  return { init };

})();

document.addEventListener('DOMContentLoaded', KanbanApp.init);
</script>
</body>
</html>
